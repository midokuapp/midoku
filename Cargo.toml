[workspace]
resolver = "2"
members = ["src-tauri", "src-ui"]

[workspace.package]
version = "0.0.0"
authors = ["Youn Mélois <youn@melois.dev>"]
license = "GPL-3.0-or-later"
repository = "https://github.com/midokuapp/midoku"
edition = "2021"
publish = false

[workspace.dependencies]
console_error_panic_hook = "0.1.7"
console_log = "1.0.0"
html-escape = "0.2.13"
js-sys = "0.3.69"
leptos = "0.6.13"
leptos_meta = "0.6.13"
lipsum = "0.9.1"
log = "0.4.22"
rand = "0.8.5"
serde = "1.0.204"
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.122"
tauri = "2.0.0-rc.0"
wasm-bindgen = "0.2.92"
wasm-bindgen-futures = "0.4.42"
