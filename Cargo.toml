[workspace]
resolver = "2"
members = ["src-tauri", "src-ui"]

[workspace.package]
version = "0.0.0"
authors = ["Youn Mélois <youn@melois.dev>"]
license = "GPL-3.0-or-later"
repository = "https://github.com/midokuapp/midoku"
edition = "2021"
publish = false

[workspace.dependencies]
console_error_panic_hook = "0.1.7"
console_log = "1.0.0"
deunicode = "1.6.0"
html-escape = "0.2.13"
js-sys = "0.3.70"
leptos = "0.6.14"
leptos-remix-icon = "1.0.3"
leptos_meta = "0.6.14"
leptos_router = "0.6.14"
lipsum = "0.9.1"
log = "0.4.22"
rand = "0.8.5"
serde = "1.0.209"
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.127"
tauri = "2.0.0-rc.8"
tauri-build = "2.0.0-rc.7"
wasm-bindgen = "0.2.93"
wasm-bindgen-futures = "0.4.43"
